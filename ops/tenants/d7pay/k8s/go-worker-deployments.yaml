apiVersion: apps/v1
kind: Deployment
metadata:
  name: d7pay-go-worker
  namespace: pk-d7pay
  labels:
    app: d7pay-go-worker
    tenant: d7pay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: d7pay-go-worker
      tenant: d7pay
  template:
    metadata:
      labels:
        app: d7pay-go-worker
        tenant: d7pay
    spec:
      containers:
        - name: worker
          image: 10.170.0.18:30086/lib/pk-go-worker-d7pay:replace-by-jenkins
          imagePullPolicy: IfNotPresent
          args: ["-mode=worker"]
          envFrom:
            - configMapRef:
                name: d7pay-config
            - secretRef:
                name: d7pay-secret
          env:
            - name: WORKER_ID
              value: d7pay-go-worker
            - name: ASYNQ_QUEUE
              value: default
            - name: APP_MYSQL_DATABASE
              value: pakistan_d7pay
            - name: APP_REDIS_DB
              value: "0"
            - name: QUERY_BILL_TIMEOUT_SECONDS
              value: "20"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
