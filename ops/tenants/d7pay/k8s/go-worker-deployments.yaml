apiVersion: apps/v1
kind: Deployment
metadata:
  name: d7pay-go-worker
  namespace: pk-d7pay
  labels:
    app: d7pay-go-worker
    tenant: d7pay
spec:
  replicas: 1
  selector:
    matchLabels:
      app: d7pay-go-worker
      tenant: d7pay
  template:
    metadata:
      labels:
        app: d7pay-go-worker
        tenant: d7pay
    spec:
      containers:
        - name: worker
          image: 10.170.0.18:30086/lib/pk-go-worker-d7pay:replace-by-jenkins
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /app/logs
              rm -f /tmp/d7pay-worker.log.pipe
              mkfifo /tmp/d7pay-worker.log.pipe
              tee -a /app/logs/worker.log < /tmp/d7pay-worker.log.pipe &
              TEE_PID=$!
              /usr/local/bin/pk-go-worker -mode=worker > /tmp/d7pay-worker.log.pipe 2>&1 &
              WORKER_PID=$!
              trap 'kill -TERM "${WORKER_PID}" 2>/dev/null || true; wait "${WORKER_PID}" 2>/dev/null || true; exit 143' TERM INT
              wait "${WORKER_PID}"
              STATUS=$?
              wait "${TEE_PID}" || true
              exit "${STATUS}"
          envFrom:
            - configMapRef:
                name: d7pay-runtime-config
            - secretRef:
                name: d7pay-runtime-secret
          env:
            - name: WORKER_ID
              value: d7pay-go-worker
            - name: ASYNQ_QUEUE
              value: default
            - name: APP_MYSQL_DATABASE
              value: pakistan_d7pay
            - name: APP_REDIS_DB
              value: "0"
            - name: APP_REDIS_ADDR
              value: redis:6379
            - name: QUERY_BILL_TIMEOUT_SECONDS
              value: "20"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: worker-log
              mountPath: /app/logs
      volumes:
        - name: worker-log
          persistentVolumeClaim:
            claimName: d7pay-workerlog-worker-pvc
---
