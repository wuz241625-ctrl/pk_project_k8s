tenant_code: d7pay
brand_name: D7pay
platform_name: D7pay
delivery_model: hosted_dedicated_instance
domain_policy: customer_owned_required

domains:
  admin: admin.d7pay.example.com
  merchant: merchant.d7pay.example.com
  api: api.d7pay.example.com
  apkdownload: apkdownload.d7pay.example.com

kubernetes:
  namespace: pk-d7pay
  image_tag_policy: pinned
  mysql_database: pakistan_d7pay
  redis_instance: redis-d7pay
  fingerprint_mount: /fingerprint
  fingerprint_host_path: /data/pk-d7pay/fingerprint
  apkdownload_mount: /usr/share/nginx/html/files/android/d7pay
  apkdownload_host_path: /data/pk-d7pay/apkdownload/d7pay
  config_map: d7pay-runtime-config
  secret: d7pay-runtime-secret
  app_signing_secret: d7pay-android-signing
  public_api_service: api-public
  public_api_strategy: host_nginx_rewrites_api_prefix_to_api_public_nodeport
  node_ports:
    apkdownload: 31080
    admin_h5: 31081
    merchant_h5: 31082
    api_public: 31085

frontend:
  admin_build_script: d7pay:prod
  merchant_build_script: d7pay:prod
  admin_title: D7pay管理系统
  merchant_title: D7payMerchant

app:
  display_name: D7pay Merchant
  short_name: D7pay
  package_name: com.d7pay.merchant
  signing_policy: shared_release_keystore
  signing_secret: d7pay-android-signing
  api_base_url: http://api.d7pay.example.com
  apkdownload_app_key: d7pay_merchant
  build_command: "ORG_GRADLE_PROJECT_appLabel='D7pay Merchant' ORG_GRADLE_PROJECT_appApplicationId=com.d7pay.merchant ORG_GRADLE_PROJECT_requireReleaseSigning=true flutter build apk --release --split-per-abi --target-platform android-arm,android-arm64 --dart-define=API_BASE_URL=http://api.d7pay.example.com --dart-define=APP_DISPLAY_NAME='D7pay Merchant' --dart-define=APP_SHORT_NAME=D7pay"

jenkins:
  publish_mode: k8s
  env_file: ops/tenants/d7pay/jenkins.env.example
  k8s_dir: ops/tenants/d7pay/k8s
  config_py_policy: generated_from_config_example_or_secret_mount
  required_steps:
    - build-admin-h5-d7pay
    - build-merchant-h5-d7pay
    - build-apkdownload-d7pay
    - build-flutter-d7pay-shared-signing
    - apply-k8s-namespace-config-secret
    - apply-k8s-h5-configmaps
    - apply-k8s-services
    - patch-k8s-deployments
    - rollout-status

data_policy:
  mysql: dedicated_database
  redis: dedicated_instance
  fingerprint: dedicated_directory
  apkdownload: dedicated_directory
  copy_real_orders: false
  copy_real_fingerprints: false
  expose_source_code: false
  expose_server_access: false
  expose_database_access: false

acceptance:
  admin_brand: D7pay
  merchant_brand: D7pay
  app_brand: D7pay Merchant
  required_channels:
    - "1001"
    - "1003"
