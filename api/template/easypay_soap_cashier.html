<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ایزی پیسہ محفوظ ادائیگی</title>
    <link rel="stylesheet" href="{{ static_url('css/reset.css') }}">
    <link rel="stylesheet" href="{{ static_url('css/utils.min.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&display=swap" rel="stylesheet">
    <script src="{{ static_url('v2/plugins/jquery/jquery-2.1.4.min.js') }}"></script>
    <script src="{{ static_url('js/layer3.js') }}"></script>
    <style>
        :root {
            --ep-green: #127d56;
            --ep-green-hover: #0e6344;
            --ep-red: #dc3545;
            --text-main: #333;
            --text-sub: #666;
        }
        body {
            font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.8;
        }
        .cashier-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-sizing: border-box;
        }
        .brand-title {
            color: var(--ep-green);
            margin-top: 0;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .amount-display {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin: 15px 0 30px;
            letter-spacing: 1px;
            direction: ltr;
        }
        .input-group {
            text-align: start;
            margin-bottom: 25px;
        }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-main);
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
            direction: ltr;
            text-align: left;
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--ep-green);
            box-shadow: 0 0 0 2px rgba(18, 125, 86, 0.2);
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-brand {
            background-color: var(--ep-green);
            color: #ffffff;
        }
        .btn-brand:hover { background-color: var(--ep-green-hover); }
        .btn-brand:disabled { background-color: #a5d0c0; cursor: not-allowed; }
        .hidden { display: none !important; }
        .countdown-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid #e5e7eb;
            border-top-color: var(--ep-green);
            animation: spin 2s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .countdown-text {
            position: absolute;
            font-size: 32px;
            font-weight: bold;
            color: var(--ep-green);
            animation: none;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .spin-reverse { animation: spin 2s linear infinite reverse; }
        .waiting-text {
            color: var(--text-sub);
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .result-icon { font-size: 72px; line-height: 1; margin-bottom: 15px; }
        .icon-success { color: var(--ep-green); }
        .icon-fail { color: var(--ep-red); }
        .result-title { margin-bottom: 10px; font-size: 22px; }
    </style>
</head>
<body>

<div class="cashier-container">
    <h2 class="brand-title">Easypaisa</h2>

    <!-- State 1: ابتدائی -->
    <div id="state-initial">
        <div class="amount-display">Rs. {{ '{0:.2f}'.format(amount) }}</div>
        <div class="input-group">
            <label for="msisdn">ایزی پیسہ موبائل نمبر</label>
            <input type="tel" id="msisdn" placeholder="03XXXXXXXXX" maxlength="11" autocomplete="tel">
        </div>
        <button id="btn-send" class="btn btn-brand">ابھی ادا کریں</button>
    </div>

    <!-- State 2: انتظار -->
    <div id="state-waiting" class="hidden">
        <div class="countdown-wrapper">
            <div class="countdown-text spin-reverse" id="timer">90</div>
        </div>
        <div class="waiting-text">
            ایزی پیسہ ایپ میں تصدیق کا انتظار ہے...<br>
            براہ کرم اپنا فون چیک کریں اور ادائیگی منظور کرنے کے لیے اپنا پن (PIN) درج کریں۔
        </div>
    </div>

    <!-- State 3: نتیجہ -->
    <div id="state-result" class="hidden">
        <div id="result-icon" class="result-icon"></div>
        <h3 id="result-title" class="result-title"></h3>
        <p id="result-msg" class="waiting-text"></p>
        <button id="btn-return" class="btn btn-brand">مرچنٹ پر واپس جائیں</button>
    </div>
</div>

<script>
    var envToken = "{{ token }}";
    var envCallback = "{{ callback }}";
    var countdownInterval;

    function switchState(stateId) {
        $('#state-initial, #state-waiting, #state-result').addClass('hidden');
        $('#' + stateId).removeClass('hidden');
    }

    function showResult(isSuccess, message) {
        clearInterval(countdownInterval);
        switchState('state-result');
        if (isSuccess) {
            $('#result-icon').html('&#10004;').removeClass('icon-fail').addClass('icon-success');
            $('#result-title').text('ادائیگی کامیاب').css('color', 'var(--ep-green)');
            // 3 秒后自动跳转
            if (envCallback && envCallback !== 'sys') {
                $('#result-msg').text('3 سیکنڈ میں خودکار واپسی...');
                setTimeout(function() { window.location.href = envCallback; }, 3000);
            } else {
                $('#result-msg').text(message || '');
            }
        } else {
            $('#result-icon').html('&#10008;').removeClass('icon-success').addClass('icon-fail');
            $('#result-title').text('ادائیگی ناکام').css('color', 'var(--ep-red)');
            $('#result-msg').text(message || '');
        }
    }

    function startPaymentProcess(msisdn) {
        switchState('state-waiting');
        var timeLeft = 90;
        var endTime = Date.now() + 90000;
        $('#timer').text(timeLeft);

        $.ajax({
            url: '{{reverse_url("easypay_initiate")}}',
            type: 'POST',
            dataType: 'json',
            data: { token: envToken, msisdn: msisdn },
            timeout: 10000,
            success: function(res) {
                if (String(res.code) !== "0") {
                    clearInterval(countdownInterval);
                    clearInterval(pollInterval);
                    showResult(false, res.message || 'ادائیگی کی درخواست بھیجنے میں ناکامی۔');
                }
            },
            error: function() {
                clearInterval(countdownInterval);
                clearInterval(pollInterval);
                showResult(false, 'نیٹ ورک کی خرابی۔ براہ کرم دوبارہ کوشش کریں۔');
            }
        });

        countdownInterval = setInterval(function() {
            var remaining = Math.ceil((endTime - Date.now()) / 1000);
            if (remaining < 0) remaining = 0;
            $('#timer').text(remaining);
            if (remaining <= 0) {
                clearInterval(countdownInterval);
                // 倒计时结束后再多轮询 10 秒，给后端缓冲时间
                setTimeout(function() {
                    clearInterval(pollInterval);
                    // 最后查一次状态再决定
                    $.ajax({
                        type: 'post',
                        url: '{{reverse_url("orderStatus", token)}}',
                        dataType: 'json',
                        timeout: 5000,
                        success: function(res) {
                            if (res.code === 0) {
                                showResult(true, 'آپ کی ادائیگی کامیابی سے مکمل ہو گئی ہے۔');
                            } else {
                                showResult(false, 'ادائیگی کا وقت ختم ہو گیا۔ براہ کرم نیا آرڈر بنائیں۔');
                            }
                        },
                        error: function() {
                            showResult(false, 'ادائیگی کا وقت ختم ہو گیا۔ براہ کرم نیا آرڈر بنائیں۔');
                        }
                    });
                }, 10000);
            }
        }, 1000);

        var pollInterval = setInterval(function() {
            $.ajax({
                type: 'post',
                url: '{{reverse_url("orderStatus", token)}}',
                dataType: 'json',
                timeout: 5000,
                success: function(res) {
                    if (res.code === 0) {
                        clearInterval(countdownInterval);
                        clearInterval(pollInterval);
                        showResult(true, 'آپ کی ادائیگی کامیابی سے مکمل ہو گئی ہے۔');
                    }
                    if (res.code === 10002) {
                        clearInterval(countdownInterval);
                        clearInterval(pollInterval);
                        showResult(false, 'ادائیگی ناکام ہو گئی۔ براہ کرم نیا آرڈر بنائیں۔');
                    }
                }
            });
        }, 3000);
    }

    $(document).ready(function() {
        $('#btn-send').click(function() {
            var msisdn = $('#msisdn').val().trim().replace(/\s+/g, '');
            if (!/^03\d{9}$/.test(msisdn)) {
                layer.msg('براہ کرم 03 سے شروع ہونے والا درست 11 ہندسوں کا موبائل نمبر درج کریں۔', {icon: 5, anim: 6});
                $('#msisdn').focus();
                return;
            }
            $(this).prop('disabled', true);
            startPaymentProcess(msisdn);
        });

        $('#btn-return').click(function() {
            if (envCallback) {
                window.location.href = envCallback;
            }
        });

        $('#msisdn').on('keypress', function(e) {
            if (e.which === 13) $('#btn-send').click();
        });
    });
</script>
</body>
</html>
